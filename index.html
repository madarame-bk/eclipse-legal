<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eclipse Support</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.5px;
    }
    .sub {
      color: #888;
      font-size: 15px;
      margin: 0 0 32px;
    }
    .divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 0 0 32px;
    }
    p {
      color: #aaa;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    a {
      color: #c084fc;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 32px;
    }
    .links a {
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Eclipse</h1>
    <p class="sub">Manga Reader</p>
    <hr class="divider" />
    <p>For support, bug reports, or feedback, reach out via email:</p>
    <p>
      <a href="mailto:eclipseappcontact@gmail.com">eclipseappcontact@gmail.com</a>
    </p>
    <p>We typically respond within 1–2 business days.</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>

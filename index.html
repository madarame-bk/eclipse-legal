<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eclipse – Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      color: #1a1a1a;
      background: #fafaf9;
      padding: 0 1rem 4rem;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 0;
    }

    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #e5e5e3;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111;
    }

    header p {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: #888;
    }

    section {
      margin-bottom: 2rem;
    }

    section h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.5rem;
    }

    section p {
      color: #444;
      font-size: 0.95rem;
    }

    section p + p {
      margin-top: 0.75rem;
    }

    a {
      color: #555;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e5e3;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Eclipse Support</h1>
      <p>Manga &amp; comic reader for iOS</p>
    </header>

    <section>
      <h2>Contact</h2>
      <p>For support, bug reports, or feedback, email us at <a href="mailto:eclipseappcontact@gmail.com">eclipseappcontact@gmail.com</a>. We read all messages and try to respond within 1-2 days.</p>
    </section>

    <section>
      <h2>Legal</h2>
      <p><a href="privacy-policy.html">Privacy Policy</a></p>
    </section>

    <footer>
      &copy; 2026 Eclipse. All rights reserved.
    </footer>
  </div>
</body>
</html>
